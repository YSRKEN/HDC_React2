name: dependabot-pr-hygiene

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/dependabot-pr-hygiene.yml"
  workflow_dispatch:
    inputs:
      cutoff_days:
        description: "Close Dependabot PRs older than this many days"
        required: true
        default: "60"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  close-old-dependabot-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Close old Dependabot PRs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const cutoffDaysInput = context.payload.inputs?.cutoff_days ?? '60';
            const cutoffDays = Number.parseInt(cutoffDaysInput, 10);
            const safeCutoffDays = Number.isFinite(cutoffDays) ? cutoffDays : 60;
            const cutoffMs = safeCutoffDays * 24 * 60 * 60 * 1000;
            const now = Date.now();

            const pullRequests = await github.paginate(
              github.rest.pulls.list,
              {
                owner,
                repo,
                state: 'open',
                per_page: 100
              }
            );

            let closed = 0;
            for (const pr of pullRequests) {
              if (pr.user?.login !== 'dependabot[bot]') {
                continue;
              }
              const createdAtMs = new Date(pr.created_at).getTime();
              if (now - createdAtMs < cutoffMs) {
                continue;
              }

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                state: 'closed'
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: `Closed by maintenance workflow because this Dependabot PR is older than ${safeCutoffDays} days.`
              });

              closed += 1;
            }

            core.notice(`Closed old Dependabot PRs: ${closed}`);
